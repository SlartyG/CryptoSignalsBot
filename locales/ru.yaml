alerts_guide_text: |
  <b>Как читать алерт</b>

  Каждое сообщение начинается с пары и типа сигнала, например:
  <b>BTCUSDT · Funding Extreme</b>

  <b>Funding Extreme</b> — ставка funding сильно отклонилась от средней за сутки.
  <b>OI + Price</b> — за час изменились открытый интерес и цена; внизу будет паттерн (новые лонги, flush и т.д.).
  <b>Liquidation Spike</b> — крупная сумма ликвидаций за короткое окно.
  <b>Volume Spike</b> — объём часовой свечи заметно выше обычного.

  Строка <b>bias</b> — направление перекоса (бычий / медвежий / нейтрально).
  <b>medium / high</b> — сила отклонения по нашим порогам.

  Это контекст для анализа, не сигнал «входи сейчас».

