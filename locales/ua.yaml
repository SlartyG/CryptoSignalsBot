alerts_guide_text: |
  <b>Як читати алерт</b>

  Кожне повідомлення починається з пари та типу сигналу, наприклад:
  <b>BTCUSDT · Funding Extreme</b>

  <b>Funding Extreme</b> — ставка funding сильно відхилилась від середньої за добу.
  <b>OI + Price</b> — за годину змінились відкритий інтерес і ціна; внизу буде паттерн.
  <b>Liquidation Spike</b> — велика сума ліквідацій за коротке вікно.
  <b>Volume Spike</b> — обсяг годинної свічки помітно вище звичного.

  Рядок <b>bias</b> — напрям перекосу (бичий / ведмежий / нейтрально).
  <b>medium / high</b> — сила відхилення за нашими порогами.

  Це контекст для аналізу, не сигнал «входь зараз».

