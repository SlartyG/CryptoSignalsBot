alerts_guide_text: |
  <b>How to read an alert</b>

  Each message starts with the pair and signal type, e.g.:
  <b>BTCUSDT · Funding Extreme</b>

  <b>Funding Extreme</b> — funding rate deviated strongly from the 24h average.
  <b>OI + Price</b> — open interest and price moved over 1h; pattern line below (new longs, flush, etc.).
  <b>Liquidation Spike</b> — large liquidations in a short window.
  <b>Volume Spike</b> — hourly volume is well above the usual level.

  The <b>bias</b> line shows tilt (bullish / bearish / neutral).
  <b>medium / high</b> — strength vs our thresholds.

  This is context for analysis, not a «enter now» signal.

